name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation files
        run: |
          echo "Checking for empty or missing doc files..."
          find . -name "*.md" -not -path "./.github/*" | while read -r file; do
            size=$(wc -c < "$file")
            if [ "$size" -lt 10 ]; then
              echo "  WARNING: $file appears empty ($size bytes)"
            fi
          done
          echo "Documentation check complete."

      - name: Verify README exists
        run: test -f README.md && echo "README.md present" || exit 1
